apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-microservice
  labels:
    app: sre-microservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sre-microservice
  template:
    metadata:
      labels:
        app: sre-microservice
    spec:
      containers:
      - name: app
        image: sre-microservice:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: sre-config
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: sre-microservice
spec:
  selector:
    app: sre-microservice
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
