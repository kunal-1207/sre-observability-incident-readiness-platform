# Default values for sre-microservice.
replicaCount: 3

image:
  repository: sre-microservice
  pullPolicy: IfNotPresent
  tag: "latest"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

failureInjection:
  latencyProbability: "0.1"
  errorProbability: "0.05"

otel:
  endpoint: "http://tempo:4317"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    username: sre_user
    password: sre_password
    database: sre_db
  primary:
    persistence:
      enabled: false # For demo purposes

database:
  url: "postgresql+asyncpg://sre_user:sre_password@{{ .Release.Name }}-postgresql:5432/sre_db"
