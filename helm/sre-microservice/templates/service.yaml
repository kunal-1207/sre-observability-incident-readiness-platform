apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-microservice.fullname" . }}
  labels:
    {{- include "sre-microservice.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "sre-microservice.selectorLabels" . | nindent 4 }}
