apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-microservice.fullname" . }}
  labels:
    {{- include "sre-microservice.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sre-microservice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-microservice.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        env:
        - name: FAILURE_LATENCY_PROBABILITY
          value: {{ .Values.failureInjection.latencyProbability | quote }}
        - name: FAILURE_ERROR_PROBABILITY
          value: {{ .Values.failureInjection.errorProbability | quote }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.otel.endpoint | quote }}
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
